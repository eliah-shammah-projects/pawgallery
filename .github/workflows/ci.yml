name: CI - PawGallery Check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: ./

      - name: Lint basic JS (optional check)
        run: |
          echo "Checking basic JS sanity..."
          node -e "console.log('Project loads OK')"